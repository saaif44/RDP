name: Build RDP System (Mac, Win, Linux)

on:
  push:
    tags:
      - 'v*' # Push a tag like v1.0.0 to trigger the release build
  workflow_dispatch: # Allows you to manually trigger it from GitHub UI

jobs:
  build-client:
    name: Build Client Agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        cd client
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        cd client
        # On macOS, we can build a universal2 binary that works on both Intel and Apple Silicon
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          pyinstaller -y --onefile --noconsole --name RDP_Agent --target-arch universal2 --collect-all eventlet --collect-all dns --collect-all engineio --collect-all socketio --collect-all mss --collect-all pyautogui --collect-all PIL --hidden-import winreg agent.py
        else
          pyinstaller -y --onefile --noconsole --name RDP_Agent --collect-all eventlet --collect-all dns --collect-all engineio --collect-all socketio --collect-all mss --collect-all pyautogui --collect-all PIL --hidden-import winreg agent.py
        fi
        
    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Client-${{ matrix.os }}
        path: client/dist/RDP_Agent*

  build-server:
    name: Build Mother System
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Build Dashboard
      run: |
        cd dashboard
        npm install
        npm run build
        
    - name: Prepare Server & Package
      run: |
        cd server
        npm install
        npm install -g pkg
        # Move the built React dashboard into the server's public folder
        mkdir public
        cp -r ../dashboard/dist/* public/
        
        # Package for Windows, Mac (x64 & arm64), and Linux using Node 18
        pkg . -t node18-win-x64,node18-macos-x64,node18-macos-arm64,node18-linux-x64 --out-path dist
        
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Server-Executables
        path: server/dist/*

  release:
    name: Create GitHub Release
    needs: [build-client, build-server]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        
    - name: Prepare Release Files
      run: |
        mkdir -p final-release
        
        # --- WINDOWS ---
        cp release-artifacts/Client-windows-latest/RDP_Agent.exe final-release/LocalRDP-Client-Windows.exe || true
        cp release-artifacts/Server-Executables/server-win.exe final-release/LocalRDP-Admin-Windows.exe || true
        
        # --- LINUX ---
        cp release-artifacts/Client-ubuntu-latest/RDP_Agent LocalRDP-Client-Linux || true
        tar -czvf final-release/LocalRDP-Client-Linux.tar.gz LocalRDP-Client-Linux || true
        cp release-artifacts/Server-Executables/server-linux LocalRDP-Admin-Linux || true
        tar -czvf final-release/LocalRDP-Admin-Linux.tar.gz LocalRDP-Admin-Linux || true
        
        # --- MAC UNIVERSAL ---
        # 1. Create Universal Admin (Mother System) Binary using lipo
        lipo -create release-artifacts/Server-Executables/server-macos-x64 release-artifacts/Server-Executables/server-macos-arm64 -output LocalRDP-Admin-Universal || true
        
        # 2. Package Admin DMG
        mkdir -p "LocalRDP-Admin.app/Contents/MacOS"
        cp LocalRDP-Admin-Universal "LocalRDP-Admin.app/Contents/MacOS/LocalRDP-Admin"
        chmod +x "LocalRDP-Admin.app/Contents/MacOS/LocalRDP-Admin"
        # Create a simple Info.plist so macOS recognizes it
        cat <<EOF > "LocalRDP-Admin.app/Contents/Info.plist"
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>LocalRDP-Admin</string>
            <key>CFBundleIdentifier</key>
            <string>com.localrdp.admin</string>
            <key>CFBundleName</key>
            <string>LocalRDP Admin</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
        </dict>
        </plist>
        EOF
        hdiutil create -volname "LocalRDP-Admin" -srcfolder "LocalRDP-Admin.app" -ov -format UDZO final-release/LocalRDP-Admin-Universal.dmg
        
        # 3. Package Client DMG
        # (Client was already built as universal2 by PyInstaller)
        mkdir -p "LocalRDP-Client.app/Contents/MacOS"
        cp release-artifacts/Client-macos-latest/RDP_Agent "LocalRDP-Client.app/Contents/MacOS/LocalRDP-Client"
        chmod +x "LocalRDP-Client.app/Contents/MacOS/LocalRDP-Client"
        cat <<EOF > "LocalRDP-Client.app/Contents/Info.plist"
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>LocalRDP-Client</string>
            <key>CFBundleIdentifier</key>
            <string>com.localrdp.client</string>
            <key>CFBundleName</key>
            <string>LocalRDP Client</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
        </dict>
        </plist>
        EOF
        hdiutil create -volname "LocalRDP-Client" -srcfolder "LocalRDP-Client.app" -ov -format UDZO final-release/LocalRDP-Client-Universal.dmg

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: final-release/*
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
