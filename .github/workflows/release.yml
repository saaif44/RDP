name: Build RDP System (Mac, Win, Linux)

on:
  push:
    tags:
      - 'v*' # Push a tag like v1.0.0 to trigger the release build
  workflow_dispatch: # Allows you to manually trigger it from GitHub UI

jobs:
  build-client:
    name: Build Client Agent (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        cd client
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        
    - name: Build with PyInstaller
      run: |
        cd client
        pyinstaller --onefile --noconsole --name RDP_Agent agent.py
        
    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Client-${{ matrix.os }}
        path: |
          client/dist/RDP_Agent*
          !client/dist/*.app

  build-server:
    name: Build Mother System
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Build Dashboard
      run: |
        cd dashboard
        npm install
        npm run build
        
    - name: Prepare Server & Package
      run: |
        cd server
        npm install
        npm install -g pkg
        # Move the built React dashboard into the server's public folder
        mkdir public
        cp -r ../dashboard/dist/* public/
        
        # Package for Windows, Mac, and Linux using Node 18 (latest supported by pkg)
        pkg . -t node18-win-x64,node18-macos-x64,node18-linux-x64 --out-path dist
        
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Server-Executables
        path: server/dist/*

  release:
    name: Create GitHub Release
    needs: [build-client, build-server]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        
    - name: Prepare Release Files
      run: |
        mkdir -p final-release
        # Collect client builds
        find release-artifacts -name "RDP_Agent*" -exec cp {} final-release/ \;
        # Collect server builds
        find release-artifacts -name "server-*" -exec cp {} final-release/ \;
        # Rename server files for clarity
        mv final-release/server-win.exe final-release/MotherSystem-Win.exe || true
        mv final-release/server-macos final-release/MotherSystem-Mac || true
        mv final-release/server-linux final-release/MotherSystem-Linux || true

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: final-release/*
        tag_name: ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
