name: Build and Release LocalRDP

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-client:
    name: Build Client Agent
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        cd client
        pip install pyinstaller eventlet dnspython flask-socketio mss pyautogui Pillow
        
    - name: Build with PyInstaller
      shell: bash
      run: |
        cd client
        if [ "${{ matrix.os }}" = "macos-latest" ]; then
          pyinstaller -y --onefile --noconsole --name RDP_Agent_arm64 --collect-all eventlet --collect-all dns --collect-all engineio --collect-all socketio --collect-all mss --collect-all pyautogui --collect-all PIL --hidden-import winreg agent.py
        else
          pyinstaller -y --onefile --noconsole --name RDP_Agent --collect-all eventlet --collect-all dns --collect-all engineio --collect-all socketio --collect-all mss --collect-all pyautogui --collect-all PIL --hidden-import winreg agent.py
        fi
        
    - name: Upload Client Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Client-${{ matrix.os }}
        path: client/dist/RDP_Agent*

  build-server:
    name: Build Mother System
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        
    - name: Install dependencies
      run: |
        cd server
        npm install
        npm install -g pkg
        
    - name: Build Dashboard
      run: |
        cd dashboard
        npm install
        npm run build
        
    - name: Prepare Server Assets
      run: |
        cd server
        mkdir -p public
        cp -r ../dashboard/dist/* public/
        # Package for Windows, Mac (x64 & arm64), and Linux
        pkg . -t node18-win-x64,node18-macos-x64,node18-macos-arm64,node18-linux-x64 --out-path dist
        
    - name: Upload Server Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: Server-Executables
        path: server/dist/*

  release:
    name: Create GitHub Release
    needs: [build-client, build-server]
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-artifacts
        
    - name: Prepare Release Files
      run: |
        mkdir -p final-release
        find release-artifacts -maxdepth 2 -type f | sort
        
        # --- WINDOWS ---
        WINDOWS_CLIENT="$(find release-artifacts/Client-windows-latest -type f -name '*.exe' | head -n 1)"
        WINDOWS_ADMIN="$(find release-artifacts/Server-Executables -type f \( -name '*win*.exe' -o -name '*.exe' \) | head -n 1)"
        test -n "$WINDOWS_CLIENT"
        test -n "$WINDOWS_ADMIN"
        cp "$WINDOWS_CLIENT" final-release/LocalRDP-Client-Windows.exe
        cp "$WINDOWS_ADMIN" final-release/LocalRDP-Admin-win64.exe
        
        # --- LINUX ---
        cp release-artifacts/Client-ubuntu-latest/RDP_Agent LocalRDP-Client-Linux || true
        tar -czvf final-release/LocalRDP-Client-Linux.tar.gz LocalRDP-Client-Linux || true
        cp release-artifacts/Server-Executables/server-linux LocalRDP-Admin-Linux || true
        tar -czvf final-release/LocalRDP-Admin-Linux.tar.gz LocalRDP-Admin-Linux || true
        
        # --- MAC UNIVERSAL ---
        
        # 1. Create Universal Admin (Mother System) DMG
        if lipo -create release-artifacts/Server-Executables/server-macos-x64 release-artifacts/Server-Executables/server-macos-arm64 -output LocalRDP-Admin-Bin; then
          mkdir -p "LocalRDP-Admin.app/Contents/MacOS"
          cp LocalRDP-Admin-Bin "LocalRDP-Admin.app/Contents/MacOS/LocalRDP-Admin"
          chmod +x "LocalRDP-Admin.app/Contents/MacOS/LocalRDP-Admin"
          cat <<EOF > "LocalRDP-Admin.app/Contents/Info.plist"
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>LocalRDP-Admin</string>
            <key>CFBundleIdentifier</key>
            <string>com.localrdp.admin</string>
            <key>CFBundleName</key>
            <string>LocalRDP Admin</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.2.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
        </dict>
        </plist>
        EOF
          hdiutil create -volname "LocalRDP-Admin" -srcfolder "LocalRDP-Admin.app" -ov -format UDZO final-release/LocalRDP-Admin-Universal.dmg
        else
          echo "Skipping Mac Admin DMG because universal binary creation failed."
        fi

        # 2. Create Mac Client (Agent) DMG
        if [ -f release-artifacts/Client-macos-latest/RDP_Agent_arm64 ]; then
          cp release-artifacts/Client-macos-latest/RDP_Agent_arm64 LocalRDP-Client-Bin
          mkdir -p "LocalRDP-Client.app/Contents/MacOS"
          cp LocalRDP-Client-Bin "LocalRDP-Client.app/Contents/MacOS/LocalRDP-Client"
          chmod +x "LocalRDP-Client.app/Contents/MacOS/LocalRDP-Client"
          cat <<EOF > "LocalRDP-Client.app/Contents/Info.plist"
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>CFBundleExecutable</key>
            <string>LocalRDP-Client</string>
            <key>CFBundleIdentifier</key>
            <string>com.localrdp.client</string>
            <key>CFBundleName</key>
            <string>LocalRDP Client</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.2.0</string>
            <key>LSMinimumSystemVersion</key>
            <string>10.13</string>
        </dict>
        </plist>
        EOF
          hdiutil create -volname "LocalRDP-Client" -srcfolder "LocalRDP-Client.app" -ov -format UDZO final-release/LocalRDP-Client-Mac-arm64.dmg
        else
          echo "Skipping Mac Client DMG because the macOS client artifact is missing."
        fi

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: final-release/*
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
